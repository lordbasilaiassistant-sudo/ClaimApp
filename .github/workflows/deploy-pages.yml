name: Deploy to GitHub Pages

# Deploys the static site on every push to main.
# No build step — the repo contents ARE the site.
# Job has minimum permissions (pages:write + id-token:write only).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment, skip queued runs.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Entire repo root is the site. No dist/ build.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
